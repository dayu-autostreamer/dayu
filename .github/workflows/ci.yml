name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python sources
        run: python -m compileall -q backend datasource components dependency/core

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r dependency/core/lib/requirements.txt \
            -r backend/requirements.txt \
            -r tests/requirements.txt

      - name: Run unit and integration tests
        run: |
          python -m pytest -m "not e2e" \
            --cov=backend \
            --cov=dependency/core/lib \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7

  python-e2e-smoke:
    name: Python e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r dependency/core/lib/requirements.txt \
            -r backend/requirements.txt \
            -r tests/requirements.txt

      - name: Run e2e smoke tests
        run: python -m pytest -m e2e -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
      VITE_BACKEND_ADDRESS: "http://127.0.0.1:8000"
      VITE_OPEN: "false"
      VITE_OPEN_CDN: "false"
      VITE_PORT: "5173"
      VITE_PUBLIC_PATH: "/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund --no-package-lock

      - name: Build frontend
        run: npm run build
