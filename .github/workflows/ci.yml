name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint GitHub Actions workflows
        run: ./actionlint -color

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            .github/requirements/torch-cpu.txt
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            dependency/core/controller/requirements.txt
            tests/requirements.txt

      - name: Install Python development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Python lint
        run: make lint-python

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python sources
        run: make python-syntax

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency:${{ github.workspace }}/datasource

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            dependency/core/controller/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r .github/requirements/torch-cpu.txt

      - name: Run unit and integration tests
        run: make test-unit-integration

  python-coverage:
    name: Python coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency:${{ github.workspace }}/datasource

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            .github/requirements/torch-cpu.txt
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            dependency/core/controller/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r .github/requirements/torch-cpu.txt

      - name: Run full Python suite with coverage
        run: make coverage-python

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: full-suite
          name: github-actions-python
          use_oidc: true
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7

  python-e2e-smoke:
    name: Python e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency:${{ github.workspace }}/datasource

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            dependency/core/controller/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run e2e smoke tests
        run: make test-e2e

  python-component-tests:
    name: Python component tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DELETE_TEMP_FILES: "False"
      LOG_LEVEL: "INFO"
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/dependency:${{ github.workspace }}/datasource

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            backend/requirements.txt
            dependency/core/lib/requirements.txt
            dependency/core/controller/requirements.txt
            tests/requirements.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run component interaction tests
        run: make test-component

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      VITE_BACKEND_ADDRESS: "http://127.0.0.1:8000"
      VITE_OPEN: "false"
      VITE_OPEN_CDN: "false"
      VITE_PORT: "5173"
      VITE_PUBLIC_PATH: "/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Run frontend checks
        run: make frontend-check
