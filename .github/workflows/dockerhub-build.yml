name: Dayu Images Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: dockerhub-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  gate:
    name: triggering gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - id: check
        name: Check if already ran in the last 60 days
        uses: actions/github-script@v7
        env:
          WORKFLOW_FILE: dockerhub-build.yml
          GATE_WINDOW_DAYS: "60"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = process.env.WORKFLOW_FILE;
            const gateWindowDays = Number(process.env.GATE_WINDOW_DAYS || "60");
            const gateWindowMs = gateWindowDays * 24 * 60 * 60 * 1000;
            
            const runs = [];
            const perPage = 100;
            let page = 1;
            
            while (true) {
              const resp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                branch: "main",
                per_page: perPage,
                page
              });
              const pageRuns = resp.data.workflow_runs || [];
              runs.push(...pageRuns);
              
              if (pageRuns.length < perPage) {
                break;
              }
              
              page += 1;
            }
            const thisRunId = context.runId;
            
            const now = new Date();
            
            const last = runs.find(r =>
              r.id !== thisRunId &&
              (r.event === "push" || r.event === "workflow_dispatch") &&
              r.status === "completed" &&
              r.conclusion === "success"
            );
            
            if (!last) {
              core.setOutput("allowed", "true");
              core.setOutput("reason", "no previous run found");
              return;
            }
            
            const lastDate = new Date(last.created_at);
            const elapsedMs = now.getTime() - lastDate.getTime();
            const elapsedDays = Math.floor(elapsedMs / (24 * 60 * 60 * 1000));
            
            if (elapsedMs < gateWindowMs) {
              core.setOutput("allowed", "false");
              core.setOutput("reason", `already ran within the last ${gateWindowDays} days, last run: #${last.run_number} at ${last.created_at} (${elapsedDays} days ago)`);
            } else {
              core.setOutput("allowed", "true");
              core.setOutput("reason", `last successful run was outside the last ${gateWindowDays} days (${last.created_at})`);
            }
  build-and-push:
    name: make all (buildx + push)
    runs-on: dayu-runner
    needs: gate
    if: needs.gate.outputs.allowed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true)

    env:
      REG: docker.io
      REPO: ${{ vars.DOCKERHUB_REPO || secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (make all)
        run: make all REG=${{ env.REG }} REPO=${{ env.REPO }}

  skipped:
    name: skipped (already ran in the last 60 days)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.allowed != 'true'
    steps:
      - name: Notify skipped
        run: |
          echo "Skip build: ${{ needs.gate.outputs.reason }}"
