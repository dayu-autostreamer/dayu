codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "0...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 5%

github_checks:
  annotations: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
