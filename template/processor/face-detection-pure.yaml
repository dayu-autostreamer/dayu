position: both
pod-template:
  image: repo:5000/dayuhub/face-detection:test-csy-01
  imagePullPolicy: Always
  env:
    - name: PROCESSOR_NAME
      value: "detector_processor"
    - name: DETECTOR_PARAMETERS
      value: >
        {
          'trt_weights':'retina_mnet.engine',
          'trt_plugin_library':'libdecodeplugin.so',
          'non_trt_weights':'retinaface.pth',
          'device':0
        }
    - name: SCENARIOS_EXTRACTORS
      value: >
        ['obj_num', 'obj_size', 'obj_velocity']
    - name: PRO_QUEUE_NAME
      value: "simple"
    - name: USE_TENSORRT
      value: "True"
port-open:
  pos: both
  port: 9000
file-mount:
  - pos: both
    path: "processor/face-detection/"
