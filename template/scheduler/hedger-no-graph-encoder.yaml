position: cloud
pod-template:
  image: scheduler
  imagePullPolicy: Always
  env:
    - name: SCH_CONFIG_EXTRACTION_NAME
      value: hedger
    # No-graph-encoder ablation.
    # Active next step: retrain from offloading_warmup with a separate checkpoint/dataset root.
    # After finishing all stages, switch profile to 'inference' to benchmark
    # hedger_no_graph_encoder_model/joint_finetune/final.
    - name: SCH_CONFIG_EXTRACTION_PARAMETERS
      value: >
        {
          'config':'hedger_config.yaml',
          'profile':'offloading_warmup',
          'overrides':{
            'device':'cuda:1',
            'training':{
              'deployment_dataset':{
                'root_dir':'deployment_dataset_no_graph_encoder',
                'clear_on_collect_start': True
              }
            },
            'checkpoint':{
              'root_dir':'hedger_no_graph_encoder_model'
            }
          }
        }
    - name: SCH_SCENARIO_RETRIEVAL_NAME
      value: simple
    - name: SCH_STARTUP_POLICY_NAME
      value: fixed
    - name: SCH_POLICY_RETRIEVAL_NAME
      value: simple
    - name: SCH_SELECTION_POLICY_NAME
      value: fixed
    - name: SCH_SELECTION_POLICY_PARAMETERS
      value: >
        {
          'scope': 'all_edge_nodes',
          'fixed_value': 'edgexn12',
          'fixed_type': 'hostname'
        }
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_NAME
      value: hedger-no-graph-encoder
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'deployment':{
            "vehicle-detection": ["edge5"],
            "pedestrian-detection": ["edge5","edgexn11"],
            "category-identification": ["edgexn8", "edgexn12"],
            "license-plate-recognition": ["edgexn8", "edgexn11"],
            "exposure-identification": ["edgexn11", "edgexn12"]
          }
        }
    - name: SCH_REDEPLOYMENT_POLICY_NAME
      value: hedger-no-graph-encoder
    - name: SCH_REDEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'deployment':{
            "vehicle-detection": ["edge5"],
            "pedestrian-detection": ["edge5","edgexn11"],
            "category-identification": ["edgexn8", "edgexn12"],
            "license-plate-recognition": ["edgexn8", "edgexn11"],
            "exposure-identification": ["edgexn11", "edgexn12"]
          }
        }
    - name: SCH_AGENT_NAME
      value: hedger-no-graph-encoder
    - name: SCH_AGENT_PARAMETERS
      value: >
        {
          'configuration':{
            'resolution': '720p',
            'fps': 10,
            'encoding': 'mp4v',
            'buffer_size': 4
          },
          'offloading':{
            'pedestrian-detection':'edgexn11',
            'exposure-identification':'edgexn12',
            'vehicle-detection':'edge5',
            'category-identification':'edgexn12',
            'license-plate-recognition':'edgexn8'
          }
        }
port-open:
  pos: cloud
  port: 9000
file-mount:
  - pos: cloud
    path: 'scheduler/hedger-no-graph-encoder/'
