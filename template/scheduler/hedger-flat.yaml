position: cloud
pod-template:
  image: scheduler
  imagePullPolicy: Always
  env:
    - name: SCH_CONFIG_EXTRACTION_NAME
      value: hedger
    # Flat ablation training:
    # one joint PPO policy decides deployment and offloading together.
    - name: SCH_CONFIG_EXTRACTION_PARAMETERS
      value: >
        {
          'config':'hedger_config.yaml',
          'profile':'joint_finetune',
          'overrides':{
            'device':'cuda:1',
            'training':{
              'total_updates': 60,
              'ppo_epochs': 2,
              'rollout': {'deployment': 8},
              'batch_size': {'deployment': 4}
            },
            'agents':{
              'deployment':{
                'actor_lr': 5e-5,
                'critic_lr': 2e-4,
                'ppo':{
                  'entropy_coef': 0.0006,
                  'entropy_coef_final': 0.00015,
                  'entropy_decay_updates': 45,
                  'value_coef': 0.5
                }
              },
              'offloading':{
                 'actor_lr': 5e-5,
                 'critic_lr': 2e-4,
                 'update_encoder': False,
                 'reward':{
                    'latency_weight': 0.12,
                    'slo_weight': 0.8,
                    'cloud_weight': 0.35
                 },
                 'penalty':{
                    'correction': 0.15
                 }
              }
            },
            'latency_guard':{
              'latency_threshold_s': 7.0,
              'window_size':16,
              'min_samples':8,
              'trigger_violation_ratio': 0.5
            },
            'checkpoint':{
              'root_dir':'hedger_flat_model',
              'load':{
                'enabled': True,
                'which':'path',
                'path':'hedger_model/joint_finetune/final.pt',
                'restore':{
                  'encoder': True,
                  'deployment_agent': True,
                  'offloading_agent': True,
                  'optimizer': False
                },
                'reset_stage_counters': True
              },
              'save':{
                'interval_updates': 5,
                'keep_last': 10
              }
            }
          }
        }
    - name: SCH_SCENARIO_RETRIEVAL_NAME
      value: simple
    - name: SCH_STARTUP_POLICY_NAME
      value: fixed
    - name: SCH_POLICY_RETRIEVAL_NAME
      value: simple
    - name: SCH_SELECTION_POLICY_NAME
      value: fixed
    - name: SCH_SELECTION_POLICY_PARAMETERS
      value: >
        {
          'scope': 'all_edge_nodes',
          'fixed_value': 'edgexn12',
          'fixed_type': 'hostname'
        }
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_NAME
      value: hedger-flat
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'deployment':{
            "vehicle-detection": ["edge5"],
            "pedestrian-detection": ["edge5","edgexn11"],
            "category-identification": ["edgexn8", "edgexn12"],
            "license-plate-recognition": ["edgexn8", "edgexn11"],
            "exposure-identification": ["edgexn11", "edgexn12"]
          }
        }
    - name: SCH_REDEPLOYMENT_POLICY_NAME
      value: hedger-flat
    - name: SCH_REDEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'deployment':{
            "vehicle-detection": ["edge5"],
            "pedestrian-detection": ["edge5","edgexn11"],
            "category-identification": ["edgexn8", "edgexn12"],
            "license-plate-recognition": ["edgexn8", "edgexn11"],
            "exposure-identification": ["edgexn11", "edgexn12"]
          }
        }
    - name: SCH_AGENT_NAME
      value: hedger-flat
    - name: SCH_AGENT_PARAMETERS
      value: >
        {
          'configuration':{
            'resolution': '720p',
            'fps': 10,
            'encoding': 'mp4v',
            'buffer_size': 4
          },
          'offloading':{
            'pedestrian-detection':'edgexn11',
            'exposure-identification':'edgexn12',
            'vehicle-detection':'edge5',
            'category-identification':'edgexn12',
            'license-plate-recognition':'edgexn8'
          }
        }
port-open:
  pos: cloud
  port: 9000
file-mount:
  - pos: cloud
    path: 'scheduler/hedger-flat/'
