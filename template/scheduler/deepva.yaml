position: cloud
pod-template:
  image: scheduler
  imagePullPolicy: Always
  env:
    - name: SCH_CONFIG_EXTRACTION_NAME
      value: deepva
    - name: SCH_CONFIG_EXTRACTION_PARAMETERS
      value: >
        {
          'service_list':'vehicle-detection,pedestrian-detection,category-identification,license-plate-recognition,exposure-identification',
          'num_services':5,
          'num_devices':4,
          'device_service_limits':'2,4,2,2',
          'device_list':'edge5,edgexn11,edgexn12,edgexn13'
        }
    - name: SCH_SCENARIO_RETRIEVAL_NAME
      value: simple
    - name: SCH_STARTUP_POLICY_NAME
      value: fixed
    - name: SCH_POLICY_RETRIEVAL_NAME
      value: simple
    - name: SCH_SELECTION_POLICY_NAME
      value: fixed
    - name: SCH_SELECTION_POLICY_PARAMETERS
      value: >
        {
          'scope': 'all_edge_nodes',
          'fixed_value': 'edgex1',
          'fixed_type': 'hostname'
        }
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_NAME
      value: fixed
    - name: SCH_INITIAL_DEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'policy':{
            "vehicle-detection": ["edge5"],
            "pedestrian-detection": ["edge5", "edgexn11"],
            "category-identification": ["edgexn11", "edgexn13"],
            "license-plate-recognition": ["edgexn12", "edgexn13"],
            "exposure-identification": ["edgexn12", "edgexn13"]
          }
        }
    - name: SCH_REDEPLOYMENT_POLICY_NAME
      value: deepva
    - name: SCH_REDEPLOYMENT_POLICY_PARAMETERS
      value: >
        {
          'redeployment_interval':60
        }
    - name: SCH_AGENT_NAME
      value: deepva
    # DeepVA uses this single scheduler YAML for both training and inference.
    #
    # Training:
    #   mode='train'
    #   load_model=False for training from scratch, or True to continue from a checkpoint.
    #   epsilon_start/epsilon_end/epsilon_decay control epsilon-greedy exploration.
    #
    # Inference / benchmark:
    #   mode='inference'
    #   load_model=True
    #   load_model_episode=<saved episode, e.g. 120>
    #   epsilon_start=0.0
    #   epsilon_end=0.0
    #   epsilon_decay=1.0
    - name: SCH_AGENT_PARAMETERS
      value: >
        {
          'configuration':{
            'resolution': '720p',
            'fps': 6,
            'encoding': 'mp4v',
            'buffer_size': 2
          },
          'mode':'train',
          'model_dir':'model_deepva_1',
          'load_model':False,
          'load_model_episode':0,
          'redeployment_interval':60,
          'reward_collection_window':30,
          'learning_rate':0.001,
          'gamma':0.95,
          'epsilon_start':1.0,
          'epsilon_end':0.08,
          'epsilon_decay':0.985,
          'target_update_freq':10,
          'hidden_dim':128,
          'replay_buffer_size':10000,
          'batch_size':32,
          'update_interval':1,
          'update_after':10,
          'save_interval':20,
          'total_steps':120,
          'min_replicas_per_service':1,
          'max_replicas_per_service':2,
          'replica_score_threshold':0.0,
          'latency_slo_s':3.0,
          'latency_clip':3.0,
          'latency_weight':0.45,
          'slo_weight':0.65,
          'queue_weight':0.10,
          'cloud_weight':0.05,
          'change_weight':0.03,
          'memory_weight':0.45,
          'normalizers':{
            'complexity':20.0,
            'arrival_rate':5.0,
            'model_flops':200.0,
            'model_memory':8.0,
            'gpu_flops':10000.0,
            'mem_available':16.0,
            'queue_length':10.0,
            'runtime':3.0,
            'bandwidth':100.0,
            'delay':3.0
          },
          'record':{
            'enabled':True,
            'delay_window_size':30,
            'runtime_alpha':0.25
          }
        }
port-open:
  pos: cloud
  port: 9000
file-mount:
  - pos: cloud
    path: 'scheduler/deepva/'
